name: UG Bazaar CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ug-bazaar-backend-main/ug-bazaar-backend-main/package-lock.json

      # Backend
      - name: Install API Dependencies
        working-directory: ug-bazaar-backend-main/ug-bazaar-backend-main
        run: npm ci

      - name: Run API Linting Checks
        working-directory: ug-bazaar-backend-main/ug-bazaar-backend-main
        run: npm run lint --if-present

      - name: Run API Test Suite
        working-directory: ug-bazaar-backend-main/ug-bazaar-backend-main
        run: npm test --if-present

      # Root Workspace
      - name: Install Monorepo Dependencies
        run: npm ci

      # Customer Frontend
      - name: Run Customer Frontend Linting
        run: npm run lint --workspace=ug-bazaar-customer-frontend --if-present

      - name: Build Customer Frontend Bundle
        run: npm run build --workspace=ug-bazaar-customer-frontend --if-present

      - name: Run Customer Frontend Tests
        run: npm test --workspace=ug-bazaar-customer-frontend --if-present

      # Admin Frontend
      - name: Run Admin Frontend Linting
        run: npm run lint --workspace=ug-bazaar-admin-frontend --if-present

      - name: Build Admin Frontend Bundle
        run: npm run build --workspace=ug-bazaar-admin-frontend --if-present

      - name: Run Admin Frontend Tests
        run: npm test --workspace=ug-bazaar-admin-frontend --if-present

  docker-image-validation:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Build Compilation
        uses: docker/build-push-action@v5
        with:
          context: ./ug-bazaar-backend-main/ug-bazaar-backend-main
          file: ./ug-bazaar-backend-main/ug-bazaar-backend-main/Dockerfile
          push: false